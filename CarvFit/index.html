<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarvFit | Secure Vault</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --blue: #007bff; --card: rgba(25, 25, 25, 0.9); --gold: #f1c40f; --black: #050505; }
        body { 
            background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden; position: relative;
        }
        
        /* Sigma Watermark Background */
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 85%; opacity: 0.04; pointer-events: none; z-index: -1;
            background: url('https://i.ibb.co/LzNfXmB/bodybuilder-silhouette.png') no-repeat center;
            background-size: contain;
        }

        .container { width: 92%; max-width: 400px; margin: 0 auto; padding-top: 50px; }
        .card { 
            background: var(--card); border-radius: 30px; padding: 25px; margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        input { 
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; box-sizing: border-box; 
        }
        .btn { 
            background: var(--blue); color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }
        
        .countdown { font-size: 2.5rem; font-weight: 900; color: var(--gold); text-align: center; margin: 20px 0; }
        .hidden { display: none !important; }
        .status-badge { background: #333; padding: 5px 12px; border-radius: 20px; font-size: 0.6rem; color: var(--gold); float: right; }
        a { color: var(--blue); text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-style:italic; letter-spacing:10px; color:var(--blue); margin:0;">CARVFIT</h1>
        </header>

        <div id="auth-section" class="card">
            <h2 style="margin:0 0 20px 0; font-weight:300;">Vault Access</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="handleAuth()">Login</button>
            <p style="text-align: center; margin-top: 20px;">
                <a href="#" onclick="forgotPassword()">Forgot Password?</a>
            </p>
        </div>

        <div id="dashboard" class="hidden">
            <div class="card">
                <span id="role-tag" class="status-badge">MEMBER</span>
                <h2 style="margin:0;">Status</h2>
                <div id="timer" class="countdown">VERIFYING...</div>
                
                <p style="font-size: 0.8rem; color: #888;">Renew Access:</p>
                <input type="file" id="receipt-file" style="margin-bottom:10px;">
                <button class="btn" onclick="alert('Sent for verification!')">Submit Receipt</button>
            </div>

            <div id="admin-view" class="hidden">
                <div class="card" style="border-color: var(--gold);">
                    <p style="color: var(--gold); font-weight: 900; font-size: 0.7rem;">BOSS CONSOLE</p>
                    <div id="pending-list" style="margin-top:10px; font-size: 0.8rem; color: #ccc;">No new receipts found.</div>
                </div>
            </div>

            <div class="card">
                <p style="color: var(--blue); font-size: 0.7rem; font-weight: 900; margin-bottom: 5px;">PAYMENT DETAILS</p>
                <h2 style="margin: 0;">811 049 8093</h2>
                <p style="color: #888; margin: 5px 0 0 0;">Opay | CarvFit Official</p>
            </div>
        </div>
    </div>

    <script>
        // FIXED FIREBASE CONFIG (No "import" statements)
        const firebaseConfig = {
            apiKey: "AIzaSyD8di8AYcgRMboUQTkdhgR0SwSo0x0szbw",
            authDomain: "carvfit-f64fa.firebaseapp.com",
            projectId: "carvfit-f64fa",
            storageBucket: "carvfit-f64fa.firebasestorage.app",
            messagingSenderId: "945780182023",
            appId: "1:945780182023:web:7dfb52021a3a689953eea2"
        };

        // Initialize Firebase the correct way for HTML
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Error:", err));
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { 
                await auth.signInWithEmailAndPassword(email, pass); 
            } catch(e) { 
                alert("Login Error: " + e.message); 
            }
        }

        async function forgotPassword() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert("Enter your email first.");
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                alert("Reset link sent! Check your inbox.");
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) {
                    const data = doc.data();
                    if(data.role === 'admin') {
                        document.getElementById('role-tag').innerText = "BOSS MODE";
                        document.getElementById('admin-view').classList.remove('hidden');
                    }
                    if(data.expiry) {
                        startTimer(data.expiry);
                    } else {
                        document.getElementById('timer').innerText = "INACTIVE";
                    }
                }
            }
        });

        function startTimer(expiry) {
            setInterval(() => {
                const diff = expiry.toDate().getTime() - Date.now();
                if (diff < 0) { 
                    document.getElementById('timer').innerText = "EXPIRED"; 
                    return; 
                }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('timer').innerText = `${d}d ${h}h`;
            }, 1000);
        }
    </script>
</body>
</html>
